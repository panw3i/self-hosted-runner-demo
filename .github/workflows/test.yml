name: Windows Build Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: [self-hosted, win-build]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show machine info
        shell: powershell
        run: |
          Write-Output "=== Machine Info ==="
          whoami
          hostname
          pwd
          Write-Output ""
          Write-Output "=== Tool Versions ==="
          go version
          node -v
          git --version
