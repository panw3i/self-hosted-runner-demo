name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, win-build]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build
        shell: powershell
        run: |
          $version = if ($env:GITHUB_REF_NAME -match '^v') { $env:GITHUB_REF_NAME } else { "dev" }
          Write-Output "Building version: $version"
          go build -ldflags "-X main.version=$version" -o build/demo-${version}-windows-amd64.exe .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/*.exe
          retention-days: 7

  release:
    needs: build
    runs-on: [self-hosted, win-build]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: build

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: powershell
        run: |
          $tag = $env:GITHUB_REF_NAME
          gh release create $tag build/*.exe `
            --title "Release $tag" `
            --notes "Build from self-hosted runner win-build-01"
          Write-Output "Release $tag created"
